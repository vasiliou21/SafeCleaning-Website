[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

# Legacy WordPress paths → new Astro routes (post-cutover SEO)
# Netlify requires non-ASCII path segments to be percent-encoded in redirect rules.

