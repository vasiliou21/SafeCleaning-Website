# ── Συμπλήρωμα legacy redirect map (2026-07-24) ──────────────────────────
# Sweep 28 παραλλαγών (τόνοι × τελικό σίγμα × trailing slash) βρήκε 16 URLs
# χωρίς redirect. Επιβεβαιωμένη απώλεια: μόνο το /υπηρεσιεσ/. Οι υπόλοιπες
# μπαίνουν ως insurance για εξωτερικά links, χωρίς claim ανάκτησης κίνησης.

# /υπηρεσιεσ  — ΕΠΙΒΕΒΑΙΩΜΕΝΟ ΚΕΝΟ: 404 με 18 GSC impressions (θέση 4,39).
#   Το WordPress slug κυκλοφορεί στο index με τελικό σ (U+03C3), ενώ ο
#   υπάρχων κανόνας πιο πάνω καλύπτει μόνο τη μορφή με ς (U+03C2).
# /υπηρεσιεσ
[[redirects]]
  from = "/%CF%85%CF%80%CE%B7%CF%81%CE%B5%CF%83%CE%B9%CE%B5%CF%83"
  to = "/ypiresies/"
  status = 301
  force = true

[[redirects]]
  from = "/%CF%85%CF%80%CE%B7%CF%81%CE%B5%CF%83%CE%B9%CE%B5%CF%83/"
  to = "/ypiresies/"
  status = 301
  force = true

# Τονισμένες/σίγμα παραλλαγές των ίδιων legacy slugs — προληπτικά.
